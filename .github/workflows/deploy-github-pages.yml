# Builds the app and deploys the dist/ folder to GitHub Pages.
#
# IMPORTANT: In the repo, open Settings → Pages. Under "Build and deployment",
# the source MUST be "GitHub Actions" only. If you still have "Deploy from a branch"
# (e.g. main / root), GitHub serves your *source* index.html — the one that loads
# /src/main.tsx — and the site will stay blank. Remove branch publishing.
#
# Site URL is usually: https://<owner>.github.io/<repo>/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build
        run: |
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY (Vite picks base from this on Actions)"
          npm run build
      - name: Confirm we are deploying Vite output (not dev index.html)
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo "::error::dist/index.html still references dev entry (src/main.tsx). Build misconfigured."
            exit 1
          fi
          if ! grep -qE 'assets/index-[^.]+\.(js|mjs)' dist/index.html; then
            echo "::error::dist/index.html has no hashed JS bundle from Vite."
            cat dist/index.html
            exit 1
          fi
          echo "OK: dist/index.html is a production build (hashed assets, no src/main.tsx)."
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
